<html lang="pt-BR">
<head>

<title>Bia · Conecte.dgt</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#F0EEE8;font-family:'Inter',sans-serif}
canvas{position:fixed;inset:0;width:100%;height:100%}

.hud-top{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;align-items:center;gap:8px;padding:7px 18px;
  border-radius:20px;background:rgba(255,255,255,0.5);
  border:1px solid rgba(80,130,220,0.2);backdrop-filter:blur(12px);
}
.hud-dot{width:7px;height:7px;border-radius:50%;background:#60EFFF;
  box-shadow:0 0 10px #60EFFF,0 0 20px rgba(96,239,255,0.5);
  animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.hud-label{font-size:10px;font-weight:600;letter-spacing:3px;color:rgba(60,100,200,0.7);text-transform:uppercase}

.gear-btn{
  position:fixed;top:16px;right:16px;z-index:100;width:36px;height:36px;
  border-radius:50%;background:rgba(255,255,255,0.5);border:1px solid rgba(80,130,220,0.2);
  backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
}
.gear-btn:hover{border-color:rgba(80,130,220,0.4);background:rgba(255,255,255,0.7)}
.gear-btn svg{width:15px;height:15px;stroke:rgba(60,100,200,0.6);fill:none;stroke-width:2}

.bottom-ui{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;padding-bottom:28px;z-index:100;
}
#status-text{
  font-size:11px;font-weight:400;letter-spacing:5px;text-transform:uppercase;
  color:rgba(50,90,200,0.65);margin-bottom:5px;transition:all .5s;
}
#sub-text{
  font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;
  color:rgba(50,90,200,0.4);margin-bottom:24px;height:14px;transition:all .5s;
}
.controls{display:flex;align-items:center;gap:16px}
.ctrl-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.5);border:1px solid rgba(80,130,220,0.2);
  backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
}
.ctrl-btn:hover{border-color:rgba(80,130,220,0.4);background:rgba(255,255,255,0.8)}
.ctrl-btn svg{width:14px;height:14px;stroke:rgba(60,100,200,0.6);fill:none;stroke-width:1.8}

.mic-btn{
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,rgba(40,100,255,0.85),rgba(20,60,200,0.9));
  border:1.5px solid rgba(100,180,255,0.5);
  box-shadow:0 0 25px rgba(60,120,255,0.35),0 0 60px rgba(60,120,255,0.12),inset 0 1px 0 rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
}
.mic-btn:hover{box-shadow:0 0 35px rgba(60,120,255,0.5),0 0 80px rgba(60,120,255,0.2)}
.mic-btn.listening{animation:mic-pulse 1.8s infinite}
.mic-btn.thinking{animation:mic-spin 2s linear infinite}
.mic-btn.speaking{
  background:linear-gradient(135deg,rgba(20,180,140,0.85),rgba(10,130,100,0.9));
  border-color:rgba(60,220,180,0.5);
  box-shadow:0 0 25px rgba(20,200,160,0.4),0 0 60px rgba(20,200,160,0.15);
}
.mic-btn svg{width:23px;height:23px;stroke:rgba(220,235,255,0.95);fill:none;stroke-width:1.8}
@keyframes mic-pulse{
  0%,100%{box-shadow:0 0 25px rgba(60,120,255,0.35),0 0 60px rgba(60,120,255,0.12)}
  50%{box-shadow:0 0 45px rgba(60,120,255,0.7),0 0 90px rgba(60,120,255,0.25)}
}
@keyframes mic-spin{
  0%{box-shadow:14px 0 25px rgba(60,120,255,0.6)}
  25%{box-shadow:0 14px 25px rgba(60,120,255,0.6)}
  50%{box-shadow:-14px 0 25px rgba(60,120,255,0.6)}
  75%{box-shadow:0 -14px 25px rgba(60,120,255,0.6)}
  100%{box-shadow:14px 0 25px rgba(60,120,255,0.6)}
}

#cfg-panel{
  position:fixed;inset:0;z-index:200;background:rgba(240,238,232,0.98);
  backdrop-filter:blur(24px);display:none;flex-direction:column;

.cfg-title{font-size:15px;font-weight:600;color:rgba(30,60,160,0.9);letter-spacing:1px;margin-bottom:24px}
.cfg-close{position:absolute;top:20px;right:20px;width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(80,130,220,0.2);background:rgba(255,255,255,0.5);

.cfg-close:hover{border-color:rgba(100,160,255,0.5);color:white}
.cfg-sec{width:100%;max-width:420px;margin-bottom:16px}
.cfg-lbl{display:block;font-size:9px;font-weight:600;color:rgba(60,100,200,0.5);

.cfg-inp{width:100%;background:rgba(255,255,255,0.7);border:1px solid rgba(80,130,220,0.2);
  border-radius:8px;padding:10px 13px;font-size:13px;font-family:'Inter',sans-serif;
  color:rgba(30,60,160,0.9);outline:none;transition:.2s}
.cfg-inp:focus{border-color:rgba(80,140,255,0.45)}
.cfg-inp::placeholder{color:rgba(60,100,200,0.3)}
select.cfg-inp{cursor:pointer;appearance:none}
.cfg-row{display:flex;gap:8px}.cfg-row .cfg-inp{flex:1}
.cfg-test{flex-shrink:0;padding:10px 13px;background:rgba(40,80,200,0.2);
  border:1px solid rgba(80,140,255,0.2);border-radius:8px;font-size:11px;
  font-family:'Inter',sans-serif;color:rgba(150,200,255,0.7);cursor:pointer;
  white-space:nowrap;transition:.2s}
.cfg-test:hover{background:rgba(40,80,200,0.4)}
.cfg-hr{width:100%;max-width:420px;border:none;border-top:1px solid rgba(80,140,255,0.08);margin:4px 0 14px}
.cfg-hint{font-size:10px;color:rgba(60,100,200,0.4);margin-top:5px;line-height:1.5}
.cfg-save{width:100%;max-width:420px;padding:12px;
  background:linear-gradient(135deg,rgba(40,100,255,0.9),rgba(20,60,200,0.9));
  border:none;border-radius:10px;font-size:13px;font-weight:600;
  font-family:'Inter',sans-serif;color:rgba(220,235,255,0.95);cursor:pointer;
  margin-top:6px;transition:.2s}
.cfg-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(40,100,255,0.35)}

#text-input{position:fixed;bottom:128px;left:50%;transform:translateX(-50%);
  width:min(360px,86vw);opacity:0;pointer-events:none;transition:.3s;z-index:100}
#text-input.show{opacity:1;pointer-events:all}
.ti-wrap{display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.75);border:1px solid rgba(80,130,220,0.2);
  border-radius:30px;padding:7px 7px 7px 16px;backdrop-filter:blur(18px)}
.ti-wrap input{flex:1;background:transparent;border:none;outline:none;
  color:rgba(30,60,160,0.9);font-family:'Inter',sans-serif;font-size:13px}
.ti-wrap input::placeholder{color:rgba(80,120,200,0.4)}
.ti-send{width:32px;height:32px;border-radius:50%;border:none;
  background:rgba(40,100,255,0.8);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.ti-send:hover{background:rgba(60,120,255,0.9);transform:scale(1.06)}
.ti-send svg{width:13px;height:13px;fill:#fff}

#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:rgba(20,180,140,0.12);border:1px solid rgba(20,180,140,0.25);
  border-radius:8px;padding:8px 16px;font-size:11px;color:#5EEAD4;
  z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const D = {
  webhook: 'https://n8nwebhook.n8nconecte.online/webhook/bia',
  num:     '5538984126995',
  key:     'd8736663d3070d98824e61dd2da611a237f385e9c4e39eccb9fd29d59602bb26',
  voice:   '21m00Tcm4TlvDq8ikWAM',
  wake:    'bia'
};
let C = loadCfg();
function loadCfg(){
  try{
    const s=JSON.parse(localStorage.getItem('bia')||'{}');
    s.webhook='https://n8nwebhook.n8nconecte.online/webhook/bia';
    return{...D,...s};
  }catch{return{...D};}
}
function salvar(){
  C={
    webhook:'https://n8nwebhook.n8nconecte.online/webhook/bia',
    num:document.getElementById('cN').value||D.num,
    key:document.getElementById('cK').value||D.key,
    voice:document.getElementById('cV').value||D.voice,
    wake:document.getElementById('cWW').value||D.wake,
  };
  localStorage.setItem('bia',JSON.stringify(C));
  if(rec){rec.stop();rec=null;}
  closeCfg();toast('✓ Configurações salvas!');
}
function openCfg(){
  const c=loadCfg();
  document.getElementById('cW').value=c.webhook;
  document.getElementById('cN').value=c.num;
  document.getElementById('cK').value=c.key;
  document.getElementById('cV').value=c.voice;
  document.getElementById('cWW').value=c.wake;
  document.getElementById('cfg-panel').classList.add('open');
}
function closeCfg(){document.getElementById('cfg-panel').classList.remove('open');}

// ── PERLIN NOISE ──────────────────────────────────────────────────────────────
const P=(function(){
  const perm=new Uint8Array(512);
  const p=[151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
  for(let i=0;i<256;i++)perm[i]=perm[i+256]=p[i];
  const fade=t=>t*t*t*(t*(t*6-15)+10);
  const lerp=(a,b,t)=>a+t*(b-a);
  const grad=(h,x,y,z)=>{const hh=h&15,u=hh<8?x:y,v=hh<4?y:hh===12||hh===14?x:z;return((hh&1)?-u:u)+((hh&2)?-v:v);};
  function noise(x,y,z=0){
    const X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;
    x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);
    const u=fade(x),v=fade(y),w=fade(z);
    const A=perm[X]+Y,AA=perm[A]+Z,AB=perm[A+1]+Z,B=perm[X+1]+Y,BA=perm[B]+Z,BB=perm[B+1]+Z;
    return lerp(lerp(lerp(grad(perm[AA],x,y,z),grad(perm[BA],x-1,y,z),u),lerp(grad(perm[AB],x,y-1,z),grad(perm[BB],x-1,y-1,z),u),v),lerp(lerp(grad(perm[AA+1],x,y,z-1),grad(perm[BA+1],x-1,y,z-1),u),lerp(grad(perm[AB+1],x,y-1,z-1),grad(perm[BB+1],x-1,y-1,z-1),u),v),w);
  }
  return{noise};
})();

// ── CANVAS ────────────────────────────────────────────────────────────────────
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,CX,CY;
let time=0;
let audioLevel=0,targetAudio=0;
let agentState='idle';
let energy=0.2;
const ENERGY={idle:0.22,listening:0.7,thinking:0.45,speaking:0.9};

// Partículas
const NUM=320;
let particles=[];

function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  CX=W/2;CY=H/2;
  buildParticles();
}

function buildParticles(){
  particles=[];
  const phi=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<NUM;i++){
    const t=i/(NUM-1);
    const inc=Math.acos(1-2*t);
    const az=phi*i;
    particles.push({
      bx:Math.sin(inc)*Math.cos(az),
      by:Math.sin(inc)*Math.sin(az),
      bz:Math.cos(inc),
      ox:Math.random()*100,
      oy:Math.random()*100,
      oz:Math.random()*100,
      size:0.8+Math.random()*2.2,
      bright:0.5+Math.random()*0.5,
    });
  }
}

let rotY=0,rotX=0,tarRotX=0;
function ry_(x,z,a){return{x:x*Math.cos(a)-z*Math.sin(a),z:x*Math.sin(a)+z*Math.cos(a)};}
function rx_(y,z,a){return{y:y*Math.cos(a)-z*Math.sin(a),z:y*Math.sin(a)+z*Math.cos(a)};}

function updateAudioPulse(v){targetAudio=Math.max(0,Math.min(1,v));}

function draw(){
  requestAnimationFrame(draw);
  time+=0.0007;

  const tE=(ENERGY[agentState]||0.22)+audioLevel*0.55;
  energy+=(tE-energy)*0.05;
  audioLevel+=(targetAudio-audioLevel)*0.18;

  rotX+=(tarRotX-rotX)*0.014;
  rotY+=0.0012+energy*0.0015;

  // Fundo — gradiente sutil azul muito escuro
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.min(W,H)*0.7);
  bg.addColorStop(0,'rgba(242,240,234,1)');
  bg.addColorStop(1,'rgba(235,232,224,1)');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  const R=Math.min(W,H)*0.3;
  const audioB=1+audioLevel*0.5;

  // ── NEBLINA INTERNA (múltiplas camadas) ──────────────────────────────────
  // Camada 1 — núcleo brilhante
  const coreR=R*(0.55+energy*0.15+audioLevel*0.2);
  const core=ctx.createRadialGradient(CX,CY,0,CX,CY,coreR);
  const coreA=0.1+energy*0.14+audioLevel*0.18;
  core.addColorStop(0,`rgba(80,150,255,${coreA})`);
  core.addColorStop(0.3,`rgba(50,110,220,${coreA*0.5})`);
  core.addColorStop(0.7,`rgba(30,70,180,${coreA*0.15})`);
  core.addColorStop(1,'rgba(10,30,100,0)');
  ctx.fillStyle=core;
  ctx.fillRect(0,0,W,H);

  // Camada 2 — neblina orgânica que se move com o ruído
  for(let i=0;i<6;i++){
    const angle=time*0.8+i*(Math.PI*2/6);
    const nx=P.noise(Math.cos(angle)*1.2+time,Math.sin(angle)*1.2+time,i*1.7);
    const ny=P.noise(Math.sin(angle)*1.2+time,Math.cos(angle)*1.2+time,i*1.7+100);
    const blobX=CX+nx*R*(0.4+energy*0.3);
    const blobY=CY+ny*R*(0.4+energy*0.3);
    const blobR=R*(0.25+energy*0.15+audioLevel*0.15+Math.abs(nx)*0.1);
    const blob=ctx.createRadialGradient(blobX,blobY,0,blobX,blobY,blobR);
    const blobA=(0.08+energy*0.12+audioLevel*0.15)*audioB;

    // Cor varia com estado — azul suave
    const hue=agentState==='speaking'?195:agentState==='thinking'?220:210;
    blob.addColorStop(0,`hsla(${hue},65%,55%,${blobA})`);
    blob.addColorStop(0.5,`hsla(${hue},55%,45%,${blobA*0.35})`);
    blob.addColorStop(1,`hsla(${hue},45%,35%,0)`);
    ctx.fillStyle=blob;
    ctx.fillRect(0,0,W,H);
  }

  // Camada 3 — brilho de fala (quando speaking)
  if(audioLevel>0.05){
    const speakGlow=ctx.createRadialGradient(CX,CY,0,CX,CY,R*1.1);
    speakGlow.addColorStop(0,`rgba(80,150,255,${audioLevel*0.1})`);
    speakGlow.addColorStop(0.5,`rgba(50,120,220,${audioLevel*0.04})`);
    speakGlow.addColorStop(1,'rgba(20,80,200,0)');
    ctx.fillStyle=speakGlow;
    ctx.fillRect(0,0,W,H);
  }

  // ── PARTÍCULAS ─────────────────────────────────────────────────────────────
  const pts=particles.map(p=>{
    const nx=P.noise(p.ox+time*0.9,p.oy,p.oz);
    const ny=P.noise(p.ox,p.oy+time*0.9,p.oz);
    const nz=P.noise(p.ox,p.oy,p.oz+time*0.9);

    // Deformação orgânica — assimétrica para não ser esfera perfeita
    const deform=(0.12+energy*0.22+audioLevel*0.3);
    const rx=R*(1+deform*nx*1.4)*audioB;
    const ry=R*(1+deform*ny*0.9)*audioB;
    const rz=R*(1+deform*nz*1.1)*audioB;

    let x=p.bx*rx+ny*R*deform*0.2;
    let y=p.by*ry+nz*R*deform*0.2;
    let z=p.bz*rz+nx*R*deform*0.2;

    const r1=ry_(x,z,rotY);x=r1.x;z=r1.z;
    const r2=rx_(y,z,rotX);y=r2.y;z=r2.z;

    const fov=Math.min(W,H)*1.5;
    const sc=fov/(fov+z+180);
    const px=CX+x*sc;
    const py=CY+y*sc;
    const depth=(z+R*1.8)/(R*3.6);
    const flicker=agentState==='listening'?Math.sin(time*80+p.ox)*.15:
                  agentState==='speaking'?Math.sin(time*180+p.ox)*audioLevel*.3:0;
    const alpha=Math.max(0.08,Math.min(1,depth*0.75+flicker+energy*0.2))*p.bright;
    const sz=Math.max(0.4,sc*p.size*(0.8+energy*0.5+audioLevel*0.35));

    return{px,py,alpha,sz,depth,z,hue:agentState==='speaking'?210:agentState==='thinking'?215:210,dark:true};
  });

  pts.sort((a,b)=>a.z-b.z);

  // Linhas de conexão — mais visíveis
  const CDIST=Math.min(W,H)*0.1;
  for(let i=0;i<pts.length;i+=2){
    for(let j=i+2;j<pts.length;j+=2){
      const dx=pts[i].px-pts[j].px,dy=pts[i].py-pts[j].py;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<CDIST){
        const a=(1-d/CDIST)*0.18*energy*(pts[i].depth+pts[j].depth)*0.5;
        if(a<0.01)continue;
        ctx.beginPath();
        ctx.strokeStyle=`rgba(20,20,30,${a*0.7+audioLevel*0.04})`;
        ctx.lineWidth=0.4+audioLevel*0.4;
        ctx.moveTo(pts[i].px,pts[i].py);
        ctx.lineTo(pts[j].px,pts[j].py);
        ctx.stroke();
      }
    }
  }

  // Pontos — núcleo preto com glow azul sutil
  pts.forEach(p=>{
    // Glow azul sutil externo
    const g=ctx.createRadialGradient(p.px,p.py,0,p.px,p.py,p.sz*5);
    g.addColorStop(0,`hsla(${p.hue},70%,40%,${p.alpha*0.35})`);
    g.addColorStop(0.4,`hsla(${p.hue},60%,35%,${p.alpha*0.12})`);
    g.addColorStop(1,`hsla(${p.hue},50%,30%,0)`);
    ctx.beginPath();ctx.fillStyle=g;
    ctx.arc(p.px,p.py,p.sz*5,0,Math.PI*2);ctx.fill();

    // Núcleo preto
    ctx.beginPath();
    ctx.fillStyle=`rgba(15,15,20,${p.alpha*0.95})`;
    ctx.arc(p.px,p.py,p.sz*1.0,0,Math.PI*2);ctx.fill();
  });

  // ── ANEL EXTERIOR ORGÂNICO ─────────────────────────────────────────────────
  ctx.beginPath();
  const steps=120;
  for(let i=0;i<=steps;i++){
    const angle=(i/steps)*Math.PI*2;
    const noise1=P.noise(Math.cos(angle)*1.5+time*0.5,Math.sin(angle)*1.5+time*0.5);
    const noise2=P.noise(Math.cos(angle)*3+time*0.3,Math.sin(angle)*3+time*0.3,50);
    const r=R*(1.05+noise1*0.12*energy+noise2*0.06+audioLevel*0.12);
    const px=CX+Math.cos(angle+rotY*0.3)*r;
    const py=CY+Math.sin(angle+rotX*0.3)*r;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  const ringA=0.12+energy*0.18+audioLevel*0.2;
  ctx.strokeStyle=`rgba(20,20,30,${ringA*0.7+0.08})`;
  ctx.lineWidth=1.2+audioLevel*1.5;
  ctx.stroke();

  // Segundo anel menor
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const angle=(i/steps)*Math.PI*2+time*0.4;
    const noise1=P.noise(Math.cos(angle)*2+time*0.6,Math.sin(angle)*2+time*0.6,200);
    const r=R*(0.72+noise1*0.1*energy+audioLevel*0.08);
    const px=CX+Math.cos(angle-rotY*0.2)*r;
    const py=CY+Math.sin(angle-rotX*0.2)*r;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle=`rgba(40,80,200,${ringA*0.25})`;
  ctx.lineWidth=0.5;ctx.stroke();
}

document.addEventListener('mousemove',e=>{tarRotX=(e.clientY/H-.5)*.3;});
document.addEventListener('touchmove',e=>{tarRotX=(e.touches[0].clientY/H-.5)*.22;},{passive:true});

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let actx=null,curSrc=null,xiAn=null,xiData=null;
let micAn=null,micData=null;

function getActx(){
  if(!actx||actx.state==='closed')actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  if(!xiAn){
    xiAn=actx.createAnalyser();xiAn.fftSize=256;
    xiData=new Uint8Array(xiAn.frequencyBinCount);
    xiAn.connect(actx.destination);
    (function readXi(){
      if(!xiAn)return;
      xiAn.getByteFrequencyData(xiData);
      let s=0;for(let i=0;i<xiData.length;i++)s+=xiData[i];
      if(agentState==='speaking')updateAudioPulse(s/(xiData.length*255)*2.8);
      requestAnimationFrame(readXi);
    })();
  }
  return actx;
}

async function xi(text){
  const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${C.voice}`,{
    method:'POST',
    headers:{'xi-api-key':C.key,'Content-Type':'application/json','Accept':'audio/mpeg'},
    body:JSON.stringify({text,model_id:'eleven_multilingual_v2',
      voice_settings:{stability:.42,similarity_boost:.8,style:.28,use_speaker_boost:true}})
  });
  if(!r.ok)throw new Error(`XI ${r.status}`);
  const ab=await r.arrayBuffer();
  const ctx2=getActx();
  const buf=await ctx2.decodeAudioData(ab);
  if(curSrc)try{curSrc.stop();}catch(e){}
  return new Promise(res=>{
    const s=ctx2.createBufferSource();
    s.buffer=buf;s.connect(xiAn);curSrc=s;s.onended=res;s.start(0);
  });
}

async function fala(text){
  setState('speaking');setStatus('FALANDO','');
  updateAudioPulse(0);
  try{await xi(text);}
  catch(e){console.warn('XI:',e.message);await fallback(text);}
  updateAudioPulse(0);
  setState('listening');
  setStatus('ESCUTANDO',`DIGA "${C.wake.toUpperCase()}..."`);
}

async function testVoz(){
  const k=document.getElementById('cK').value;
  const v=document.getElementById('cV').value;
  if(!k){alert('Digite a API Key primeiro!');return;}
  C={...C,key:k,voice:v};
  try{await xi('Olá Martins! Sou a Bia da Conecte.');toast('✓ Voz funcionando!');}
  catch(e){toast('⚠ Erro: '+e.message);}
}

function fallback(text){
  return new Promise(res=>{
    if(!window.speechSynthesis){res();return;}
    speechSynthesis.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      u.lang='pt-BR';u.rate=.95;u.pitch=1.1;
      const vs=speechSynthesis.getVoices();
      const v=vs.find(v=>v.name==='Luciana')||vs.find(v=>v.lang==='pt-BR')||vs.find(v=>v.lang.startsWith('pt'));
      if(v)u.voice=v;u.onend=u.onerror=res;speechSynthesis.speak(u);
    },80);
  });
}

// ── MIC CAPTURE ───────────────────────────────────────────────────────────────
async function startMicCapture(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const a2=new(window.AudioContext||window.webkitAudioContext)();
    const src=a2.createMediaStreamSource(stream);
    micAn=a2.createAnalyser();micAn.fftSize=256;
    micData=new Uint8Array(micAn.frequencyBinCount);
    src.connect(micAn);
    (function readMic(){
      if(!micAn)return;
      micAn.getByteFrequencyData(micData);
      let s=0;for(let i=0;i<micData.length;i++)s+=micData[i];
      if(agentState==='listening')updateAudioPulse(s/(micData.length*255)*3.5);
      requestAnimationFrame(readMic);
    })();
  }catch(e){console.warn('Mic:',e.message);}
}

// ── RECONHECIMENTO ────────────────────────────────────────────────────────────
let rec=null,lis=false,last='',tOpen=false;
const micBtn=document.getElementById('micBtn');

function setState(s){
  agentState=s;micBtn.className='mic-btn';
  if(s==='listening')micBtn.classList.add('listening');
  else if(s==='thinking')micBtn.classList.add('thinking');
  else if(s==='speaking')micBtn.classList.add('speaking');
}
function setStatus(m,s){
  document.getElementById('status-text').textContent=m;
  document.getElementById('sub-text').textContent=s||'';
}
function toast(m,ms=3000){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='pt-BR';r.continuous=true;r.interimResults=true;
  r.onresult=e=>{
    const t=Array.from(e.results).map(x=>x[0].transcript).join('').toLowerCase().trim();
    if(e.results[e.results.length-1].isFinal&&t.includes(C.wake.toLowerCase())){
      const msg=t.replace(new RegExp(C.wake+'[,.]?\\s*','i'),'').trim();
      if(msg.length>1){setState('thinking');setStatus('PROCESSANDO','');enviarBia(msg);}
      else setStatus('ESCUTANDO','SIM? PODE FALAR...');
    }
  };
  r.onerror=e=>{if(e.error!=='no-speech')setStatus('ESCUTANDO',`DIGA "${C.wake.toUpperCase()}..."`);};
  r.onend=()=>{if(lis)setTimeout(()=>{try{r.start();}catch(e){}},300);};
  return r;
}

function startLis(){
  if(!rec)rec=initRec();
  if(!rec){toast('Sem suporte a voz — use o teclado');toggleInput();return;}
  lis=true;setState('listening');
  setStatus('ESCUTANDO',`DIGA "${C.wake.toUpperCase()}..."`);
  try{rec.start();}catch(e){}
  startMicCapture();
}
function stopLis(){
  lis=false;setState('idle');setStatus('PAUSADO','TOQUE PARA RETOMAR');
  updateAudioPulse(0);if(rec)rec.stop();
}
function toggleMic(){lis?stopLis():startLis();}
setInterval(()=>{if(lis&&agentState==='listening'){try{rec.stop();}catch(e){}}},20000);

// ── API ───────────────────────────────────────────────────────────────────────
async function enviarBia(msg){
  try{
    const r=await fetch(C.webhook,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,from:C.num})
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    const rep=d.response||'Não consegui processar.';
    last=rep;await fala(rep);
  }catch(e){
    await fala('Tive um problema de conexão. Verifique se o workflow está ativo.');
  }
}

async function enviarWhats(){
  if(!last){toast('Nenhuma resposta para enviar');return;}
  try{
    await fetch(C.webhook,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:`Bia, me manda no WhatsApp: "${last}"`,from:C.num})
    });
    toast('✓ Enviado para o WhatsApp!');
  }catch{toast('Erro ao enviar');}
}

function toggleInput(){
  tOpen=!tOpen;
  document.getElementById('text-input').classList.toggle('show',tOpen);
  if(tOpen)setTimeout(()=>document.getElementById('tMsg').focus(),100);
}
function enviarTxt(){
  const m=document.getElementById('tMsg').value.trim();
  if(!m)return;
  document.getElementById('tMsg').value='';
  setState('thinking');setStatus('PROCESSANDO','');enviarBia(m);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize',resize);
resize();draw();

document.addEventListener('click',async function init(){
  document.removeEventListener('click',init);
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    await actx.resume();
    xiAn=actx.createAnalyser();xiAn.fftSize=256;
    xiData=new Uint8Array(xiAn.frequencyBinCount);
    xiAn.connect(actx.destination);
    (function readXi(){
      if(!xiAn)return;
      xiAn.getByteFrequencyData(xiData);
      let s=0;for(let i=0;i<xiData.length;i++)s+=xiData[i];
      if(agentState==='speaking')updateAudioPulse(s/(xiData.length*255)*2.8);
      requestAnimationFrame(readXi);
    })();
  }catch(e){}
  if(window.speechSynthesis){
    speechSynthesis.getVoices();
    speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices());
  }
  startLis();
},{once:true});
</script>
